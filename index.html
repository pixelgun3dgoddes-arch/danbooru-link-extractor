<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Danbooru Extractor</title>

<style>
:root {
  --bg: #0a0c10;
  --panel: #121722;
  --text: #e8ecf3;
  --muted: #98a2b3;
  --border: #1c2330;
  --accent: #6aa6ff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding:
    env(safe-area-inset-top)
    14px
    env(safe-area-inset-bottom);
}

/* HEADER */
header {
  padding: 10px 2px 12px;
}

h1 {
  font-size: 18px;
  margin: 0;
  font-weight: 650;
  letter-spacing: 0.2px;
}

.sub {
  margin-top: 4px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.35;
}

/* INPUT */
textarea {
  width: 100%;
  min-height: 110px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  padding: 12px;
  font-size: 16px;
  outline: none;
  resize: none;
}

textarea:focus {
  border-color: var(--accent);
}

/* BUTTONS */
.action {
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: #0a0c10;
  font-weight: 650;
  font-size: 15px;
  min-height: 48px;
}

button:active {
  transform: scale(0.99);
}

/* RESULTS */
.results {
  flex: 1;
  overflow-y: auto;
  margin-top: 12px;
  padding-bottom: 12px;
}

/* LINKS */
.item {
  display: block;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  background: rgba(255,255,255,0.02);
  color: #bcd2ff;
  text-decoration: none;
  font-size: 14px;
  word-break: break-all;
}

.item:active {
  border-color: var(--accent);
}

/* CLICKED LINK */
.item.visited {
  border-color: #2ecc71;
  color: #7dffb2;
  background: rgba(46, 204, 113, 0.08);
}

/* EMPTY */
.empty {
  color: var(--muted);
  font-size: 14px;
  padding: 10px 2px;
}

.spacer {
  height: 8px;
}
</style>
</head>

<body>

<header>
  <h1>Danbooru Extractor</h1>
  <div class="sub">Paste text or links → get Danbooru posts instantly</div>
</header>

<textarea id="input" placeholder="Paste here..."></textarea>

<div class="action">
  <button onclick="extract()">Extract links</button>
  <button onclick="clearText()" style="margin-top:10px; background:#ff5c5c; color:#0a0c10;">
    Clear text
  </button>
</div>

<div class="results" id="output"></div>

<div class="spacer"></div>

<script>
function getVisited() {
  return JSON.parse(localStorage.getItem("visitedDanbooru") || "[]");
}

function saveVisited(list) {
  localStorage.setItem("visitedDanbooru", JSON.stringify(list));
}

function markVisited(id) {
  let visited = getVisited();
  if (!visited.includes(id)) {
    visited.push(id);
    saveVisited(visited);
  }
}

function clearText() {
  document.getElementById("input").value = "";
  document.getElementById("output").innerHTML = "";
}

function extract() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");
  output.innerHTML = "";

  const regex = /https?:\/\/danbooru\.donmai\.us\/posts?\/(?:show\/)?(\d+)/g;

  let ids = [];
  let match;

  while ((match = regex.exec(text)) !== null) {
    ids.push(match[1]);
  }

  if (ids.length === 0) {
    const fallback = text.match(/\b\d{5,7}\b/g);
    if (fallback) ids = fallback;
  }

  ids = [...new Set(ids)];

  if (ids.length === 0) {
    output.innerHTML = `<div class="empty">No Danbooru links found.</div>`;
    return;
  }

  const visited = getVisited();

  ids.forEach(id => {
    const url = `https://danbooru.donmai.us/posts/${id}`;

    const a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.className = "item";
    a.textContent = url;

    if (visited.includes(id)) {
      a.classList.add("visited");
    }

    a.addEventListener("click", () => {
      markVisited(id);
      a.classList.add("visited");
    });

    output.appendChild(a);
  });
}
</script>

</body>
</html>
